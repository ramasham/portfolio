    <linearGradient id="chipStroke" x1="120" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6" stop-opacity="0.42" />
      <stop offset="1" stop-color="#EC4899" stop-opacity="0.2" />
    </linearGradient>

    <linearGradient id="windowStroke" x1="735" y1="110" x2="1110" y2="518" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9A8D4" stop-opacity="0.16" />
      <stop offset="0.5" stop-color="#C4B5FD" stop-opacity="0.1" />
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.22" />
    </linearGradient>

    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" stroke="#8B5CF6" stroke-opacity="0.12" />
    </pattern>

    <filter id="cardShadow" x="740" y="44" width="460" height="470" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.35" />
    </filter>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="34" />
    </filter>

    <style>
      .sans {
        font-family: "DejaVu Sans", "Arial", sans-serif;
      }

      .mono {
        font-family: "DejaVu Sans Mono", "Consolas", monospace;
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <ellipse cx="180" cy="90" rx="240" ry="220" fill="url(#glowPurple)" filter="url(#softBlur)" />
  <ellipse cx="1080" cy="120" rx="220" ry="190" fill="url(#glowPink)" filter="url(#softBlur)" />
  <ellipse cx="920" cy="540" rx="240" ry="170" fill="url(#glowCard)" filter="url(#softBlur)" />

  <text x="98" y="122" class="mono" font-size="60" font-weight="700" fill="url(#accent)">&gt;_</text>

