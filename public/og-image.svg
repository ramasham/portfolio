    </radialGradient>

    <radialGradient id="glowCard" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 540) rotate(90) scale(180 260)">
      <stop stop-color="#C4B5FD" stop-opacity="0.12" />
      <stop offset="1" stop-color="#C4B5FD" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="accent" x1="104" y1="124" x2="620" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0ABFC" />
      <stop offset="0.5" stop-color="#C4B5FD" />
