    </linearGradient>

    <linearGradient id="textFade" x1="120" y1="220" x2="640" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#D8CCFF" />
