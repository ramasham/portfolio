<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1080" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141022" />
      <stop offset="0.58" stop-color="#0F0F1A" />
      <stop offset="1" stop-color="#090910" />
    </linearGradient>

    <radialGradient id="glowPurple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 90) rotate(90) scale(240 320)">
      <stop stop-color="#8B5CF6" stop-opacity="0.28" />
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowPink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 120) rotate(90) scale(220 280)">
      <stop stop-color="#EC4899" stop-opacity="0.22" />
